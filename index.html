<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم إشعارات مكتبة MYM</title>
    <!-- استدعاء مكتبة EmailJS -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background-color: #f0f2f5; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #2c3e50; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .checkbox-group { margin: 15px 0; background: #f9f9f9; padding: 10px; border-radius: 8px; }
        button { width: 100%; padding: 12px; background-color: #16a085; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #138d75; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>إرسال إشعار للمؤلفين</h2>
    <form id="notificationForm">
        <label>بريد الطفل:</label>
        <input type="email" id="user_email" required>
        
        <label>اسم الطفل:</label>
        <input type="text" id="kid_name" required>
        
        <label>اسم القصة:</label>
        <input type="text" id="story_name" required>

        <div class="checkbox-group">
            <label>حالة الطلب:</label>
            <select id="status_dropdown" required>
              <option value="" disabled selected>اختر حالة الطلب...</option>
              <option value="لم تتم">لم تتم</option>
              <option value="تم القبول">تم القبول</option>
              <option value="تم الرفض">تم الرفض</option>
              <option value="تم فتح ملف طلبك.">تم فتح ملف طلبك</option>
              <option value="تم مراجعة قصتك من قبل مسئول القسم.">تم مراجعة قصتك من قبل مسئول القسم</option>
              <option value="تم مراجعة طلبك من قبل ادارة المكتبة.">تم مراجعة طلبك من قبل ادارة المكتبة</option>
              <option value="تم رفع قصتك، شاهدها هنا: https://mym-apps.vercel.app/library/kidz">تم الرفع (رابط القصة)</option>
          </select><br>
        </div>

        <label>ملاحظات إضافية:</label>
        <textarea id="notes" rows="4"></textarea>
        
        <button type="submit" id="sendBtn">إرسال الإشعار</button>
    </form>
</div>

<script>
    // تهيئة EmailJS
    (function(){ emailjs.init("bnfYhVLurvImtFQ1v"); })(); // ضع مفتاحك هنا

    document.getElementById('notificationForm').addEventListener('submit', function(event) {
        event.preventDefault();
        const btn = document.getElementById('sendBtn');
        btn.innerText = "جاري الإرسال...";

        // تجميع الحالات
        let statusList = [];
        document.querySelectorAll('.status:checked').forEach(cb => {
            statusList.push(`<li>${cb.value}</li>`);
        });

        // استبدل جزء تجميع الحالات داخل دالة الـ submit بهذا الكود:
        const selectedStatus = document.getElementById('status_dropdown').value;
        const statusUpdatesHTML = `<li>${selectedStatus}</li>`;

        const templateParams = {
            user_email: document.getElementById('user_email').value,
            kid_name: document.getElementById('kid_name').value,
            story_name: document.getElementById('story_name').value,
            status_updates: statusUpdatesHTML, // الآن ترسل الحالة المختارة فقط
            notes: document.getElementById('notes').value
        };

        // إرسال الإيميل
        emailjs.send('service_oqjq19v', 'template_kf61qrj', templateParams)
            .then(() => {
                alert('تم إرسال الإشعار بنجاح!');
                btn.innerText = "إرسال الإشعار";
                document.getElementById('notificationForm').reset();
            }, (err) => {
                alert('حدث خطأ: ' + JSON.stringify(err));
                btn.innerText = "إرسال الإشعار";
            });
    });
</script>

</body>
</html>
